<!DOCTYPE html>
<html lang="en" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <!-- Block Google Translate: it rewrites React-owned DOM text nodes, which
         crashes reconciliation (removeChild on replaced nodes) → white screen.
         Apps are generated in the builder's own language; a crash is strictly
         worse than no in-place translation. -->
    <meta name="google" content="notranslate" />
    <title>My App</title>
    <meta name="theme-color" content="#3B82F6" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <style>
      :root {
        --sat: env(safe-area-inset-top, 0px);
        --sab: env(safe-area-inset-bottom, 0px);
        --sal: env(safe-area-inset-left, 0px);
        --sar: env(safe-area-inset-right, 0px);
      }
      html {
        min-height: calc(100% + var(--sat));
        -webkit-tap-highlight-color: transparent;
        -webkit-overflow-scrolling: touch;
        touch-action: manipulation;
      }
      html, body { overscroll-behavior: none; margin: 0; }
      body { min-height: 100dvh; overflow: hidden; background: rgb(var(--color-bg, 255 255 255)); -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; }
      input, textarea, [contenteditable] { -webkit-user-select: text; user-select: text; }
      /* Platform shell lives on #app-shell so AI-authored `#root { ... }` rules
         can't override platform positioning. #app-shell > #root is (0,2,0) which
         beats AI's (0,1,0) #root selectors via specificity. */
      #app-shell { display: contents; }
      #app-shell > #root { position: fixed; top: 0; left: 0; right: 0; bottom: 0; }
      #app-shell > #root > .h-full:first-child > :last-child:not(.fixed) { position: relative; z-index: 50; }
      /* RESPONSIVE-ERA SHELL (experiment / ship reference).
         The phone-era shell clamped #app-shell to a centered 390px bezel at
         >=480px. This variant removes that clamp entirely: #root fills the
         viewport at every width and the app's own responsive layout (its
         sm:/md:/lg: breakpoints) does the work. Safe-area vars stay (they
         resolve to 0 on desktop, harmless). Nothing else changes. */
    </style>
  </head>
  <body>
    <div id="app-shell"><div id="root"></div></div>
    <script>
    // ── Error capture ──
    // Runs BEFORE module scripts so it catches ESM linking errors
    // (e.g. "does not provide an export named 'X'") that would otherwise
    // kill the module graph before any in-module listeners are registered.
    ;(function() {
      var seen = new Set()
      window.__whackaErrors = window.__whackaErrors || []
      function report(msg, source) {
        if (!msg) return
        // Drop non-actionable noise before it costs a round-trip or a seen-slot:
        // the opaque cross-origin "Script error." (browser redacts all detail)
        // and library INFO:/DEBUG:/LOG: console lines (e.g. TFLite XNNPACK, routed
        // to console.error by Emscripten). Mirrors the server-side guard in
        // app-health.ts so old + new apps stay consistent.
        var _m = String(msg).trim()
        if (/^script error\.?$/i.test(_m) || /^(INFO|DEBUG|LOG):/i.test(_m)) return
        if (seen.has(msg)) return
        seen.add(msg)
        if (seen.size > 50) seen.clear()
        try {
          window.parent.postMessage({ type: 'preview-error', error: { message: msg, source: source } }, '*')
        } catch(e) {}
        // Buffer for the published-app server reporter (_client-report.js), which
        // loads as a module afterwards and drains this; also forward live if it's
        // already installed. Caught here even if it happened before module load.
        try {
          window.__whackaErrors.push({ message: msg, source: source })
          if (window.__whackaErrors.length > 50) window.__whackaErrors.shift()
        } catch(e) {}
        try { if (window.__whackaReportToServer) window.__whackaReportToServer(msg, source) } catch(e) {}
      }
      window.__previewReport = report

      window.addEventListener('error', function(e) {
        report(e.message, e.filename ? e.filename + ':' + e.lineno + ':' + e.colno : undefined)
      })

      window.addEventListener('unhandledrejection', function(e) {
        var reason = e.reason
        report(reason && reason.message ? reason.message : String(reason), 'unhandledrejection')
      })

      window.addEventListener('vite:error', function(e) {
        var err = e.detail && e.detail.err
        if (err) {
          var msg = err.message || String(err)
          var frame = (err.frame || err.loc) ? ((err.id || '') + ':' + ((err.loc && err.loc.line) || '')) : err.id
          report(msg, frame || 'vite:error')
        }
      })

      // Vite 5+ shows transform errors via a <vite-error-overlay> custom element
      // in Shadow DOM — no console.error, no vite:error CustomEvent. Watch for
      // it being mounted and pluck the message out.
      function _reportOverlay(el) {
        try {
          var sr = el.shadowRoot
          if (!sr) return
          var msgEl = sr.querySelector('.message-body') || sr.querySelector('pre.message') || sr.querySelector('pre') || sr
          var fileEl = sr.querySelector('.file-link') || sr.querySelector('.file')
          var msg = (msgEl && msgEl.textContent || '').trim()
          var file = fileEl && fileEl.textContent && fileEl.textContent.trim()
          if (msg) report(msg.slice(0, 2000), file || 'vite:overlay')
        } catch(e) {}
      }
      function _watchOverlay(el) {
        // shadowRoot may not be attached yet; poll briefly.
        var tries = 0
        var tick = function() {
          if (el.shadowRoot && el.shadowRoot.textContent && el.shadowRoot.textContent.length) _reportOverlay(el)
          else if (tries++ < 20) setTimeout(tick, 50)
        }
        tick()
      }
      try {
        new MutationObserver(function(muts) {
          for (var i = 0; i < muts.length; i++) {
            var added = muts[i].addedNodes
            for (var j = 0; j < added.length; j++) {
              var n = added[j]
              if (n && n.nodeType === 1 && String(n.tagName).toLowerCase() === 'vite-error-overlay') _watchOverlay(n)
            }
          }
        }).observe(document.documentElement, { childList: true, subtree: true })
      } catch(e) {}

      var _origError = console.error
      console.error = function() {
        _origError.apply(console, arguments)
        var parts = []
        for (var i = 0; i < arguments.length; i++) parts.push(String(arguments[i]))
        var msg = parts.join(' ')
        if (msg.indexOf('Warning:') === 0) return
        // [vite]-prefixed lines: keep actual errors (Pre-transform, Internal
        // server error, Failed to resolve import, …), drop info/HMR spam.
        var isVite = /^\[vite\]/i.test(msg)
        if (isVite && !/error|failed|invalid|cannot/i.test(msg)) return
        if (!isVite && /^\[\w+\]/.test(msg)) return
        report(msg, 'console.error')
      }
    })()
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
